data:
  raw_dir: "data/raw"                          # downloaded OHLCV parquets from Binance
  processed_dir: "data/processed"              # aligned multi-timeframe data
  features_dir: "data/features"                # engineered feature parquets (per symbol)
  labels_dir: "data/labels"                    # triple-barrier label parquets
  models_dir: "models"                         # trained XGBoost + meta-labeler files
  results_dir: "results"                       # backtest NAV curves and trade logs
  monitoring_dir: "monitoring"                 # drift reports and model health checks
  checkpoints_dir: "data/checkpoints"          # scalers, imputers, HMM states, XS stats
  timeframes: ["15m", "1h", "4h", "1d"]        # timeframes fetched and aligned per symbol
  primary_timeframe: "15m"                     # timeframe used for model training and signals
  train_end: "2025-09-30"                      # last date of training set (inclusive)
  val_start: "2025-10-01"                      # validation set start (hyperparameter selection)
  val_end: "2025-12-31"                        # validation set end
  test_start: "2026-01-01"                     # held-out test set start (never touched during tuning)
  min_history_bars: 5000                       # minimum bars required to include a symbol
  min_align_bars: 200                          # minimum overlapping bars across timeframes

features:
  warmup_bars: 2000                            # bars discarded at start to let indicators stabilise
  lookback_windows: [5, 10, 20, 50, 100, 200]  # rolling window sizes for momentum/vol features
  lag_periods: [1, 2, 3, 5, 10, 20]           # return lag periods added as features
  ofi_window: 20                               # order flow imbalance rolling window (bars)
  amihud_window: 20                            # Amihud illiquidity ratio window (bars)
  kyle_window: 20                              # Kyle lambda price-impact window (bars)
  acf_window: 96                               # rolling ACF lag-1 and lag-5 window (96 × 15m = 24h)
  rv_daily_bars: 96                            # bars in one trading day (96 × 15m = 24h)
  rv_weekly_days: 5                            # trading days in one week for weekly RV
  rv_monthly_days: 22                          # trading days in one month for monthly RV
  vwap_window: 20                              # VWAP deviation rolling window (bars)
  spread_window: 20                            # bid-ask spread proxy rolling window (bars)
  funding_zscore_window: 672                   # funding rate z-score window (~7 days of 15m bars)
  funding_percentile_window: 2880              # funding percentile rank window (~30 days)
  oi_zscore_window: 96                         # open interest z-score window (96 × 15m = 24h)
  oi_change_windows: [4, 16, 96]              # OI change windows: 1h, 4h, 24h in 15m bars
  ls_zscore_window: 96                         # long/short ratio z-score window (24h)
  taker_zscore_window: 96                      # taker buy/sell ratio z-score window (24h)
  positioning_extreme_zscore: 2.0             # z-score threshold for OI/LS/taker extreme flags
  use_chronos: false                           # enable Amazon Chronos time-series embeddings (slow)
  ema_spans: [9, 21, 50]                       # EMA spans for price-vs-EMA deviation and crossover features
  supertrend_period: 10                        # ATR period for Supertrend bands
  supertrend_mult: 3.0                         # ATR multiplier for Supertrend bands
  stochrsi_period: 14                          # RSI + Stochastic period for StochRSI
  stochrsi_smooth_k: 3                         # %K smoothing bars for StochRSI
  williams_r_period: 14                        # lookback period for Williams %R
  keltner_period: 20                           # EMA period for Keltner Channel midline
  keltner_mult: 1.5                            # ATR multiplier for Keltner Channel bands
  squeeze_momentum_period: 12                  # momentum oscillator period for TTM Squeeze
  vwap_session_hours: [0, 8, 16]              # UTC hours at which session-anchored VWAP resets (matches funding)
  cmf_window: 20                               # rolling window for Chaikin Money Flow
  parkinson_vol_windows: [14, 50]             # ATR/Parkinson volatility estimation windows
  macd_fast: 12                                # MACD fast EMA span
  macd_slow: 26                                # MACD slow EMA span
  macd_signal: 9                               # MACD signal line EMA span
  bb_period: 20                                # Bollinger Band rolling window
  bb_std_mult: 2.0                             # Bollinger Band standard deviation multiplier
  adx_period: 14                               # ADX / DI smoothing period (Wilder EMA)
  atr_periods: [14, 50]                        # ATR/NATR periods computed as features
  macro_ffill_limit_bars: 2880                 # max bars to forward-fill macro/onchain data (~30 days of 15m)
  fracdiff_threshold: 0.01                     # ADF p-value threshold for fractional differencing
  fracdiff_d_step: 0.1                         # step size when searching for minimum d
  htf_ffill_limits:                            # max bars to forward-fill higher-timeframe features
    "1h": 4                                    # 1h feature stale after 4 × 15m bars
    "4h": 16                                   # 4h feature stale after 16 × 15m bars
    "1d": 96                                   # 1d feature stale after 96 × 15m bars
  htf_approval_threshold: 0.45                 # HTF approval filter: LONG requires pred >= threshold, SHORT requires pred <= (1-threshold); intentionally loose to avoid over-filtering

labels:
  tp_atr_mult: 1.5                             # take-profit = ATR × 1.5 ≈ 1% at median ATR 0.69% (matches live tp_fixed_pct=0.01)
  sl_atr_mult: 7.0                             # stop-loss = ATR × 7.0 ≈ 5% at median ATR 0.69% (matches live sl_fixed_pct=0.05)
  tp_min_pct: 0.008                            # minimum take-profit distance (0.8%)
  tp_max_pct: 0.015                            # maximum take-profit distance (1.5%)
  sl_min_pct: 0.04                             # minimum stop-loss distance (4%)
  sl_max_pct: 0.06                             # maximum stop-loss distance (6%)
  vol_lookback: 20                             # ATR lookback window for barrier sizing
  max_hold_bars: 32                            # time barrier — exit after 32 bars (8h) if no hit
  fee_adjust_labels: true                      # reclassify marginal TP hits below round-trip cost as neutral
  round_trip_cost_pct: 0.003                   # total round-trip cost: 2×0.001 fee (Binance FAPI taker) + 2×0.0005 slippage
  h1_rolling_median_window: 480                # 1h volume median window for liquidity filter
  weight_clip_min: 0.1                         # minimum sample weight after clipping
  weight_clip_max: 3.0                         # maximum sample weight after clipping
  dead_zone_cost_multiple: 0.5                 # penalty weight for dead-zone (no-trade) labels

regime:
  n_states: 3                                  # HMM states: bull / bear / sideways (ablation from 4-state)
  hmm_covariance_type: "diag"                  # diagonal covariance — fewer params, more stable with 3 states
  hmm_n_iter: 100                              # EM iterations for HMM fitting
  hmm_retrain_hours: 6                         # retrain HMM every 6h in live mode (immediate for regime shifts)
  hmm_burnin_bars: 100                         # bars discarded before HMM state assignment
  adx_trend_threshold: 25.0                   # ADX value above which the market is considered trending
  bocpd_min_size: 50                           # minimum segment size for BOCPD changepoint detection
  bocpd_penalty_floor: 5                       # minimum penalty value for BOCPD predict (pen = max(floor, log(n)*mult))
  bocpd_penalty_mult: 2.0                      # log(n) multiplier for BOCPD penalty

model:
  xgb_device: "cpu"                            # override to "cuda" on Kaggle GPU or set env XGB_DEVICE=cuda
  xgb_n_estimators: 500                        # default tree count (Optuna may override)
  xgb_max_depth: 4                             # default max tree depth
  xgb_learning_rate: 0.05                      # default shrinkage rate
  xgb_subsample: 0.8                           # row subsampling ratio per tree
  xgb_colsample_bytree: 0.8                    # feature subsampling ratio per tree
  xgb_min_child_weight: 20                     # minimum sum of sample weights in a leaf
  xgb_reg_alpha: 0.1                           # L1 regularisation (feature sparsity)
  xgb_reg_lambda: 1.0                          # L2 regularisation (weight shrinkage)
  xgb_gamma: 0.05                               # minimum loss reduction to make a split
  xgb_early_stopping_rounds: 50               # stop if no improvement for 50 rounds
  cv_n_splits: 8                               # number of purged time-series CV folds (was 5)
  embargo_pct: 0.02                            # fraction of data embargoed between train/val folds (was 0.01)
  embargo_bars_min: 96                         # minimum embargo gap in bars — 96×15m = 24h (was 192/48h; reduced for CVaR tail sample count)
  optuna_n_trials: 20                          # hyperparameter search trials per symbol (faster with better objective)
  optuna_patience: 10                         # early-stop Optuna if no improvement after N trials (was 5 — too tight, stopped after warm-start won trial 1)
  objective_da_weight: 0.2                     # weight of directional accuracy in Optuna objective (was 0.4)
  objective_ic_weight: 0.3                     # weight of information coefficient in objective
  objective_sortino_weight: 0.5                 # weight of Calmar-adjusted Sortino in objective (renamed from objective_sharpe_weight)
  objective_cvar_weight: 0.1                   # weight of CVaR 95% tail penalty in objective (NEW)
  objective_dead_zone: 0.05                    # prob distance from 0.5 treated as no-signal in objective (NEW, was hardcoded 0.03)
  stability_threshold: 0.75                    # minimum selection frequency for stability selection (was 0.70)
  stability_n_bootstrap: 100                   # bootstrap iterations for stability selection (was 30)
  stability_rf_n_estimators: 50               # RF trees per bootstrap in stability selection (was hardcoded 30)
  stability_rf_max_depth: 8                   # RF max depth per bootstrap in stability selection (was hardcoded 5)
  variance_threshold: 1.0e-6                   # drop features with variance below this
  permutation_importance_top_k: 80            # keep top-k features by permutation importance
  shap_top_k: 30                               # keep top-k features by SHAP importance
  importance_stability_spearman_min: 0.6       # min Spearman correlation of feature ranks across folds
  staleness_decay_days: 30                     # decay window for feature importance staleness check
  staleness_exclude_threshold: 0.3            # exclude feature if staleness score exceeds this
  calibration_method: "sigmoid"                # probability calibration method — sigmoid (Platt) is more robust than isotonic on small val sets
  conformal_q_level: 0.85                      # conformal prediction quantile level (was 0.90)
  conformal_width_full: 0.20                   # prediction interval width below this → full position size
  conformal_width_60pct: 0.40                  # width between 0.20–0.40 → 60% position size (above → 30%)
  # uncertainty_proxy = 1 - 2|p - 0.5| ranges: p=0.55→0.10, p=0.65→0.30, p=0.70→0.40, p=0.75→0.50, p=0.80→0.60
  uncertainty_proxy_full: 0.30                 # proxy below this → full position size (p > 0.65 confidence)
  uncertainty_proxy_partial: 0.50             # proxy below this → 60% position size (p > 0.75); above → 30%
  meta_n_estimators: 300                      # meta-labeler max tree count (early stopping may use fewer)
  meta_max_depth: 6                            # meta-labeler max depth (was 4)
  meta_early_stopping_rounds: 10              # patience for meta-labeler early stopping (8-12 features → overfit risk)
  meta_signal_floor: 0.25                     # minimum meta-prob to pass a signal (was 0.1)
  # Tier gate — edge-based, not raw DA. With 89% class imbalance post-neutral-drop,
  # raw DA is dominated by majority baseline; only edge (DA − baseline) carries signal.
  tier_A_edge_min: 0.03                        # tier A: DA must exceed naive majority baseline by ≥3pp
  tier_A_edge_min_folds: 5                     # tier A: per-fold edge must hold in at least N of 8 folds
  tier_A_overfit_ratio_max: 1.8                # tier A: train_logloss / val_logloss ≤ 1.8 (reject severe memorisation)
  tier_A_fold_quality_min: 0.0                  # tier A: minimum fold_quality_score (fold_consistency × sharpe); currently unused in tier condition
  tier_A_pbo_max: 0.40                         # tier A: maximum probability of backtest overfitting
  tier_A_sharpe_wfo_min: 2.0                   # tier A: min pertrade_sharpe_mean (OOF per-trade, net of cost; NOT walk-forward equity Sharpe)
  tier_A_adversarial_auc_max: 0.60             # tier A: adversarial AUC must be below this (no drift)
  tier_A_leverage_max: 3                       # tier A maximum leverage
  tier_A_leverage_default: 2                   # tier A default leverage applied in stage_06 signal sizing
  tier_B_edge_min: 0.015                       # tier B: minimum edge over naive baseline (lower bar)
  tier_reject_baseline: 0.80                   # hard reject: pct_positive_val > 0.80 AND edge < tier_B_edge → Tier C
  tier_B_leverage_max: 1                       # tier B: no leverage (1× only)
  fdr_alpha: 0.05                              # false discovery rate threshold for feature selection
  # Kaggle GPU run reference values — applied via OmegaConf.update in notebook.py
  optuna_n_trials_kaggle: 25                  # fewer trials on Kaggle (GPU trains each trial ~10x faster)
  stability_n_bootstrap_kaggle: 20            # fewer bootstrap iterations on Kaggle

portfolio:
  signal_floor_prob: 0.2                      # minimum signal_strength to enter a trade
  volume_multiplier: 2.0                       # volume per posisi = wallet × volume_multiplier (full wallet per slot, sesuai Est Profit.xlsx)
  max_volume_usdt: 0                           # hard cap on total volume in USDT (0 = no cap)
  max_position_size: 0.10                      # maximum single position as fraction of equity
  max_total_margin_pct: 0.80                   # maximum total margin deployed (80% of equity)
  kelly_fraction: 0.5                          # half-Kelly sizing fraction
  dead_zone_direction: 0.05                    # prob distance from 0.5 below which direction=0 (was 0.03)
  dead_zone_signal: 0.03                       # prob distance from 0.5 below which signal cancelled (was 0.02)
  cvar_confidence_levels: [0.95, 0.99]         # CVaR confidence levels for tail risk estimation
  cvar_lambda_penalty: 0.5                     # CVaR penalty weight in position sizing
  cvar_z_score: 2.33                           # z-score for parametric CVaR approximation (99th percentile normal)
  h4_reduce_scale: 0.5                         # size multiplier when h4 filter flags a conflict (50% reduction)
  dcc_fallback_ewm_span: 60                    # EWM span for correlation when DCC-GARCH unavailable
  correlation_reduce_threshold: 0.85           # reduce second position size if correlation exceeds this
  correlation_skip_threshold: 0.95             # skip entry entirely if correlation exceeds this
  correlation_reduce_pct: 0.30                 # reduce correlated position by this fraction
  stress_test_max_dd: 0.03                     # reject position if stress-test drawdown exceeds 3%
  max_turnover: 0.30                           # maximum portfolio turnover per rebalance (30%)
  rebalance_trigger_regime_change: true        # force rebalance when HMM regime shifts

backtest:
  train_pct: 0.70                              # training set fraction of total data
  val_pct: 0.15                                # validation set fraction
  test_pct: 0.15                               # held-out test set fraction
  wfo_train_ratio: 0.70                        # walk-forward train window as fraction of expanding window
  wfo_min_windows: 5                           # minimum walk-forward windows required
  slippage_pct: 0.002                          # assumed market impact slippage (0.2% per fill)
  commission_pct: 0.001                        # Binance FAPI taker fee (0.1%)
  delisted_slippage_mult: 2.0                  # extra slippage multiplier for delisted coins
  daily_halt_dd_pct: 0.15                      # halt all trading if daily drawdown exceeds 15%
  ath_pause_dd_pct: 0.10                       # pause trading if equity drops 10% from all-time high
  ath_pause_hours: 48                          # resume trading after ATH pause once N hours pass
  daily_profit_target_pct: 0.02               # stop taking new trades if daily profit exceeds 2%
  spread_guard_natr_mult: 0.20                 # skip entry if spread > 20% of normalised ATR
  limit_requote_seconds: 15                    # wait N seconds before requoting a stale limit order
  limit_skip_seconds: 30                       # cancel limit order and skip if unfilled after N seconds
  partial_fill_min_ratio: 0.90                 # accept partial fill only if at least 90% filled
  sl_atr_mult: 7.0                             # stop-loss distance in ATR multiples — matches labels
  tp_atr_mult: 1.5                             # take-profit distance in ATR multiples — matches labels
  trailing_trigger_pct: 0.005                  # activate trailing stop after 0.5% favourable move
  trailing_atr_mult: 1.0                       # trailing stop distance in ATR multiples
  funding_skip_net_pnl_threshold: 0.003        # skip entry if projected funding cost exceeds net PnL
  funding_projected_close_threshold: 0.0005    # close position early if funding eats this much equity
  min_notional_buffer_mult: 1.5                # require 1.5× minimum notional in margin buffer
  below_notional_skip_threshold: 0.30          # skip if position size is below 30% of min notional
  liquidity_adv_threshold_usd: 10000000        # minimum 30-day average daily volume in USD
  order_book_levels: 5                         # order book depth levels used for liquidity check
  max_size_liquidity_pct: 0.10                 # max position size as fraction of order book depth
  large_cap_symbols: ["BTCUSDT", "SOLUSDT", "AVAXUSDT", "LINKUSDT", "UNIUSDT"]  # relaxed liquidity rules
  attribution_trigger_tier_a: 100             # run PnL attribution after N trades (tier A)
  attribution_trigger_tier_b: 50              # run PnL attribution after N trades (tier B)
  attribution_trigger_global: 300             # run global attribution after N total trades
  sqrt_impact_coef: 0.1                        # square-root market impact coefficient

growth_gate:
  threshold: 300.0                             # equity target to unlock multi-symbol live trading
  demo_trades_required: 500                    # minimum demo trades before mainnet is allowed

  # ── KONTROL UTAMA — ubah bagian ini saja ────────────────────────────
  max_open_positions: 2                        # max posisi terbuka bersamaan
  fixed_leverage: 10                           # leverage tetap semua posisi (10x, margin kecil per posisi)
  tp_fixed_pct: 0.01                           # TP = 1% price move per posisi (sesuai Est Profit.xlsx)
  sl_fixed_pct: 0.05                           # SL = 5% price move (ruang gerak 15m)
  daily_profit_target_pct: 0.04               # stop buka posisi baru setelah +4% wallet/hari
  daily_loss_limit_pct: 0.05                  # hard stop setelah -5% wallet/hari
  # ─────────────────────────────────────────────────────────────────────

  tiers:                                       # vol_mult per tier (wallet × vol_mult = notional per posisi)
    - max_equity: 150                          # tier 1: wallet < $150 — konservatif
      max_symbols: 2
      vol_mult: 2.0                            # notional = wallet × 2
      leverage_a_max: 3                        # tier 1: max leverage for tier-A symbols (conservative)
    - max_equity: 2500                         # tier 2: $150 ≤ wallet < $2500 — growth phase agresif
      max_symbols: 2
      vol_mult: 3.0                            # notional = wallet × 3
      leverage_a_max: 5                        # tier 2: growth phase allows more leverage
    - max_equity: 999999                       # tier 3: wallet >= $2500 — income phase
      max_symbols: 2
      vol_mult: 2.0                            # notional = wallet × 2 (turun lagi)
      leverage_a_max: 3                        # tier 3: income phase — reduced leverage for capital preservation

htf_models:
  enabled: true                              # train 1h/4h/1d XGBoost approval-filter models (independent of 15m primary)
  n_estimators: 300                          # max trees (early stopping may use fewer)
  max_depth: 4                               # shallow — limited data on 1d
  learning_rate: 0.05
  early_stopping_rounds: 30
  val_es_ratio: 0.8                          # fraction of val bars used for early stopping (rest = calibration)
  min_cal_bars: 2                            # minimum calibration bars; cal_split = min(80%*val, val-min_cal_bars)
  min_train_bars:
    "1h": 500                                # ~21 days of 1h bars minimum
    "4h": 200                                # ~33 days of 4h bars minimum
    "1d": 100                                # ~100 days of daily bars minimum
  # ATR-based triple-barrier label (on native HTF bars, not resampled from 15m)
  label_tp_mult: 1.5                         # TP = entry + label_tp_mult × ATR14
  label_sl_mult: 1.0                         # SL = entry - label_sl_mult × ATR14
  label_n_bars:                              # look-ahead window per timeframe
    "4h": 6                                  # 4h × 6 = 24h forward window
    "1d": 5                                  # 1d × 5 = 1 trading week forward window

monitoring:
  psi_minor_threshold: 0.10                   # PSI above this → log warning (minor drift)
  psi_major_threshold: 0.20                   # PSI above this → trigger retraining (major drift)
  psi_retrain_feature_count: 10              # retrain if more than N features show major drift
  degradation_reduce_std: 2                   # reduce position size if DA drops 2 std below baseline
  degradation_pause_std: 3                    # pause trading if DA drops 3 std below baseline
  adversarial_check_days: 30                  # rolling window for adversarial train/val discrimination
  adversarial_retrain_auc: 0.65              # retrain if adversarial AUC exceeds this (feature drift)
  retrain_schedule_days: 30                   # scheduled full retrain interval (days)
  rolling_win_rate_window: 20                 # live win rate rolling window (number of trades)
  model_weight_decay_days: 30                 # decay window for model importance weighting
  model_stale_threshold: 0.3                  # flag model as stale if weight decays below this

trading:
  mode: "DEMO"                                 # active trading mode: DEMO / MAINNET
  leverage: 10                                 # leverage untuk semua posisi live (alias fixed_leverage di growth_gate)
  endpoints:
    DEMO: "https://demo-fapi.binance.com"       # Binance paper trading futures (no real money)
    MAINNET: "https://fapi.binance.com"        # Binance live futures — NEVER use accidentally
  websocket_ping_interval: 30                  # WebSocket keepalive ping interval (seconds)
  websocket_reconnect_delay: 5                 # seconds to wait before reconnecting a dropped WS
  rate_limit_backoff_base: 2                   # exponential backoff base (seconds) on 429 errors
  rate_limit_backoff_max: 60                   # maximum backoff wait (seconds)
  memecoin_symbols: ["TRUMPUSDT", "1000BONKUSDT", "WIFUSDT", "PNUTUSDT", "PENGUUSDT", "1000FLOKIUSDT"]
  memecoin_demo_trades_required: 200           # minimum demo trades before trading memecoins
  memecoin_sharpe_required: 0.3               # minimum backtest Sharpe to trade a memecoin
  # Symbols permanently excluded from live trading regardless of model results.
  # Add symbols here if they consistently underperform or have exchange issues.
  exclude_symbols: []
  # Bear/ranging regime filter: skip new LONG entries when BTC is in confirmed bear/sideways.
  # SHORT entries are still allowed in bear regime (regime_filter_allow_short: true).
  bear_regime_filter_enabled: true
  bear_regime_filter_allow_short: true         # allow short entries even in bear regime
  dead_man_switch_seconds: 60                  # cancel all orders if main loop silent for 60s
  bar_seconds: 900                             # bar duration in seconds (15m=900); used to compute bars_held drift metric

macro:
  release_lags:                                # publication delay per macro indicator (forward-fill safe)
    oecd_unemployment:
      lag_days: 45                             # OECD unemployment published ~45 days after reference month
      skip_days: 14
      safety_buffer_days: 14
    oecd_cpi:
      lag_days: 30                             # CPI published ~30 days after reference month
      skip_days: 7
      safety_buffer_days: 14
    oecd_industrial_prod:
      lag_days: 45
      skip_days: 14
      safety_buffer_days: 14
    macro_bond_10y:
      lag_days: 0                              # daily market data — no publication lag
    macro_vix:
      lag_days: 0
    macro_sp500:
      lag_days: 0
    macro_usd_index:
      lag_days: 0
    macro_inflation_cpi:
      lag_days: 1                              # 1-day lag to avoid same-day lookahead
    macro_unemployment:
      lag_days: 45
    macro_euro:
      lag_days: 1
    macro_industrial_prod:
      lag_days: 30
    market_gold:
      lag_days: 1
    market_silver:
      lag_days: 1
    market_dji:
      lag_days: 0
    market_nikkei:
      lag_days: 1                              # 1-day lag due to timezone difference
    market_ftse100:
      lag_days: 1
    market_kospi:
      lag_days: 1
    market_hushen300:
      lag_days: 1
    market_msci_world:
      lag_days: 1
    market_commodity:
      lag_days: 1
    fear_greed:
      lag_days: 0                              # Alternative.me fear & greed — same-day available

adversarial:
  valid_auc_max: 0.55                          # AUC below this → no drift detected (pass)
  warn_auc_max: 0.70                           # AUC above this → drift warning logged
  n_estimators: 100                            # adversarial classifier tree count
  max_depth: 4                                 # shallow tree to detect covariate shift only

ab_testing:
  sprt_alpha: 0.05                             # SPRT type-I error rate (false positive threshold)
  sprt_beta: 0.20                              # SPRT type-II error rate (false negative threshold)
  h0_da: 0.51                                  # null hypothesis directional accuracy (baseline)
  h1_da: 0.53                                  # alternative hypothesis DA (meaningful improvement)
  shadow_min_trades: 50                        # minimum shadow trades before SPRT decision

telegram:
  enabled: true                                # set false to disable all Telegram notifications
  notify_entry: true                           # send message on every position entry
  notify_exit: true                            # send message on every position exit
  notify_daily_summary: true                   # send daily P&L summary
  notify_heartbeat: true                       # hourly heartbeat message
  chart_n_bars: 80                             # candlestick bars shown in entry/exit charts
  heartbeat_interval_hours: 1                  # hours between heartbeat messages
